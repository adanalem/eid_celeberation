<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Eid Magic 🌙</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Cinzel:wght@700&family=Great+Vibes&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #CFA75F;
            --light-gold: #f5d191;
            --deep-green: #061a14;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #0a2e25 0%, #050f0c 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Poppins', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* Initial Page Load Animation */
        #input-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            padding: 60px 40px;
            border-radius: 40px;
            border: 1px solid rgba(207, 167, 95, 0.4);
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            z-index: 10;
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 1.2s cubic-bezier(0.17, 0.67, 0.83, 0.67) forwards;
        }

        @keyframes slideUp {
            to { opacity: 1; transform: translateY(0); }
        }

        h2 { font-family: 'Cinzel', serif; color: var(--gold); margin-bottom: 10px; font-size: 28px; }
        .sub-text { font-size: 14px; color: #aaa; margin-bottom: 30px; letter-spacing: 1px; }

        input {
            padding: 15px;
            border-radius: 50px;
            border: 2px solid rgba(207, 167, 95, 0.3);
            background: rgba(0, 0, 0, 0.5);
            color: white;
            font-size: 18px;
            width: 280px;
            margin-bottom: 25px;
            outline: none;
            text-align: center;
            transition: 0.4s;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 20px rgba(207, 167, 95, 0.2); width: 300px; }

        .btn-celebrate {
            background: linear-gradient(45deg, var(--gold), #fff, var(--gold));
            background-size: 200% auto;
            color: #111;
            border: none;
            padding: 15px 45px;
            font-weight: 700;
            border-radius: 50px;
            cursor: pointer;
            text-transform: uppercase;
            transition: 0.5s;
            animation: shineBtn 3s infinite;
        }

        @keyframes shineBtn { to { background-position: 200% center; } }

        /* Wish Overlay Styles */
        #wish-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            padding: 20px;
        }

        .wish-name {
            font-family: 'Great Vibes', cursive;
            font-size: clamp(50px, 10vw, 100px);
            color: var(--light-gold);
            margin-bottom: 10px;
            text-shadow: 0 0 20px rgba(207, 167, 95, 0.5);
        }

        .dua-box {
            max-width: 600px;
            text-align: center;
            font-size: clamp(16px, 4vw, 22px);
            line-height: 1.6;
            color: #eee;
            margin: 20px 0;
            font-style: italic;
            opacity: 0;
            animation: fadeInDua 2s ease forwards 1s;
        }

        @keyframes fadeInDua { to { opacity: 1; } }

        /* Floating Lanterns */
        .lantern {
            position: absolute;
            pointer-events: none;
            animation: floatUp var(--speed) linear infinite;
            filter: drop-shadow(0 0 15px var(--gold));
            z-index: 1;
            opacity: 0;
        }

        @keyframes floatUp {
            0% { transform: translateY(110vh) scale(0.5); opacity: 0; }
            20% { opacity: 0.7; }
            80% { opacity: 0.7; }
            100% { transform: translateY(-20vh) scale(1.2); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="lantern-container"></div>

    <div id="input-card">
        <h2>✨ Eid-ul-Fitr ✨</h2>
        <div class="sub-text">Enter your name for a special blessing</div>
        <input type="text" id="userName" placeholder="Type your name here..." autocomplete="off">
        <br>
        <button class="btn-celebrate" onclick="startMagic()">Open Your Gift</button>
    </div>

    <div id="wish-overlay">
        <div style="font-family: 'Cinzel'; color: var(--gold); letter-spacing: 5px;">EID MUBARAK</div>
        <div class="wish-name" id="finalWish"></div>
        
        <div class="dua-box">
            "May Allah shower His countless blessings upon you and your family on this holy day. 
            May your heart be filled with joy, your soul with peace, and your home with laughter."
            <br><br>
            <span style="color: var(--gold); font-weight: 600;">Ameen ✨</span>
        </div>

        <button onclick="location.reload()" style="margin-top: 30px; background: transparent; color: white; border: 1px solid rgba(255,255,255,0.3); padding: 10px 20px; border-radius: 5px; cursor: pointer;">Reset Magic</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    
    <script>
        // Start lanterns immediately
        function createLanterns() {
            const container = document.getElementById('lantern-container');
            const icons = ['🌙', '⭐', '🏮', '✨'];
            for(let i=0; i<35; i++) {
                setTimeout(() => {
                    const lantern = document.createElement('div');
                    lantern.className = 'lantern';
                    lantern.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                    lantern.style.left = Math.random() * 100 + 'vw';
                    lantern.style.setProperty('--speed', (6 + Math.random() * 6) + 's');
                    lantern.style.fontSize = (20 + Math.random() * 25) + 'px';
                    container.appendChild(lantern);
                }, i * 250);
            }
        }
        createLanterns();

        function startMagic() {
            const name = document.getElementById('userName').value;
            if(!name) {
                alert("Please share your name to receive the blessing! ✨");
                return;
            }

            document.getElementById('input-card').style.display = "none";
            document.getElementById('wish-overlay').style.display = "flex";
            document.getElementById('finalWish').innerHTML = name;

            // Grand Celebration Confetti
            var end = Date.now() + (4 * 1000);
            var colors = ['#CFA75F', '#ffffff', '#f5d191'];

            (function frame() {
                confetti({
                    particleCount: 3,
                    angle: 60,
                    spread: 55,
                    origin: { x: 0 },
                    colors: colors
                });
                confetti({
                    particleCount: 3,
                    angle: 120,
                    spread: 55,
                    origin: { x: 1 },
                    colors: colors
                });

                if (Date.now() < end) {
                    requestAnimationFrame(frame);
                }
            }());
        }
    </script>
</body>
</html>
